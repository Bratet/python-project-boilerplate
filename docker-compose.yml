services:
  app:
    build:
      context: .
      target: dev
      args:
        PYTHON_VERSION: "${PYTHON_VERSION:-3.13}"
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - .:/app
      - venv:/app/.venv
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  venv:
